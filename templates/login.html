<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wallet Live</title>
    <!-- Adicionando Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-4 font-sans text-slate-900">
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 sm:p-10 transition-all">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500 text-sm">Please sign in to your account</p>
        </div>
        
        <form  method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors duration-200"
                       placeholder="Enter your username">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors duration-200"
                       placeholder="••••••••">
            </div>

            
            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                Sign in
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm">
            <p class="text-slate-600">Don't have an account? 
                <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
